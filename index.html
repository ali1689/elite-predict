<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ELITE PREDICT | AI-Powered Football Analytics</title>
    <meta name="description" content="The world's most accurate AI football prediction engine. Free for the community. Real-time data, expert analytics, and 85%+ win rates." />
    <meta name="keywords" content="football predictions, AI football analytics, soccer predictions, football tips, match predictions, elite predict" />
    <meta name="author" content="Elite Predict" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://elitepredicts.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://elitepredicts.com/" />
    <meta property="og:site_name" content="Elite Predict" />
    <meta property="og:title" content="ELITE PREDICT | AI-Powered Football Analytics" />
    <meta property="og:description" content="The world's most accurate AI football prediction engine. Free for the community. Real-time data, expert analytics, and 85%+ win rates." />
    <meta property="og:image" content="https://elitepredicts.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://elitepredicts.com/" />
    <meta name="twitter:title" content="ELITE PREDICT | AI-Powered Football Analytics" />
    <meta name="twitter:description" content="The world's most accurate AI football prediction engine. Free for the community. Real-time data, expert analytics, and 85%+ win rates." />
    <meta name="twitter:image" content="https://elitepredicts.com/og-image.png" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#0f172a" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Elite Predict",
      "url": "https://elitepredicts.com",
      "description": "The world's most accurate AI football prediction engine. Free for the community. Real-time data, expert analytics, and 85%+ win rates.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://elitepredicts.com/predictions?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lexend:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols (display=block: glyph stays blank during load, never shows the raw ligature word) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      rel="stylesheet"
    />

    <!-- Prevent the flash of raw icon names (e.g. "dark_mode", "logout") on first
         load: hide icon spans until the Material Symbols font is ready, reserving
         ~1em so there's no layout jump. Safety timeout guarantees they reveal. -->
    <style>
      html:not(.ms-ready) .material-symbols-outlined {
        visibility: hidden;
        display: inline-block;
        width: 1em;
        overflow: hidden;
        white-space: nowrap;
      }
    </style>
    <script>
      (function () {
        function reveal() { document.documentElement.classList.add("ms-ready"); }
        if (document.fonts && document.fonts.ready) {
          try { document.fonts.load('24px "Material Symbols Outlined"'); } catch (e) {}
          document.fonts.ready.then(reveal).catch(reveal);
        }
        // Safety: never keep icons hidden if the font is slow or blocked.
        setTimeout(reveal, 2500);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
